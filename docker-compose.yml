version: "3.9"

services:
  agent:
    build: .
    container_name: clinica-agente-ia
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - chroma_data:/app/chroma_db
      - ./docs:/app/docs:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  chroma_data:
    driver: local
